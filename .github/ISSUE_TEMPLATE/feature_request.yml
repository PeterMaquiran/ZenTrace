name: Feature request
description: Suggest an improvement or new capability
title: "[feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributions: []
    validations: {}
    value: |
      Have an idea for ZenTrace? Tell us what problem you are trying to solve — feature requests grounded in real debugging pain are the most useful.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Where would this feature live?
      options:
        - Core library / API
        - DevTools UI / UX
        - Chrome extension
        - Instrumentation (HTTP, logs, etc.)
        - Exporters / integrations (OpenTelemetry, Zipkin, etc.)
        - Examples / documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What debugging or tracing problem does this solve?
      placeholder: |
        When debugging parallel async flows, I cannot easily compare sibling span durations side by side.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like ZenTrace to behave?
      placeholder: |
        Add a comparison view in the timeline that highlights the slowest sibling span in a group.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, tools, or workarounds you tried.
    validations:
      required: false

  - type: dropdown
    id: willingness
    attributes:
      label: Contribution
      description: Are you interested in implementing this?
      options:
        - I can open a PR for this
        - I can help test a prototype
        - I am sharing the idea only
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and discussions for similar requests
          required: true
